<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeKit Studio - Dashboard</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="container">
    <h2>Welcome to Your Dashboard</h2>

    <div id="userInfo">
        <!-- User info will appear here -->
    </div>

    <div id="features">
        <h3>Your Features</h3>
        <ul>
            <li><button id="createSiteBtn">Create New Site</button></li>
            <li><button id="viewSitesBtn">View My Sites</button></li>
        </ul>
    </div>

    <div id="userSites" class="sites-container">
        <!-- User's sites will appear as cards -->
    </div> 

    <button id="logoutBtn">Logout</button>
</div>

<script src="app.js"></script>
</body>
</html>
